---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dont-fire-short-token
spec:
  template:
    spec:
      containers:
        - name: app
          image: app:v1
      volumes:
        - name: token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fire-long-token
spec:
  template:
    spec:
      containers:
        - name: app
          image: app:v1
      volumes:
        - name: token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 604800
                  path: token
