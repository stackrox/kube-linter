---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dont-fire
spec:
  template:
    spec:
      containers:
        - name: app
          image: registry.example.com/app@sha256:abc123def456
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fire-tag-only
spec:
  template:
    spec:
      containers:
        - name: app
          image: registry.example.com/app:v1.2.3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fire-no-tag
spec:
  template:
    spec:
      containers:
        - name: app
          image: registry.example.com/app
