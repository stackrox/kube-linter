---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dont-fire
spec:
  template:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          image: app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fire-default-mount
spec:
  template:
    spec:
      containers:
        - name: app
          image: app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fire-explicit-true
spec:
  template:
    spec:
      automountServiceAccountToken: true
      containers:
        - name: app
          image: app:v1
