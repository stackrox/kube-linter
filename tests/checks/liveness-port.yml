apiVersion: apps/v1
kind: Deployment
spec:
  template:
    spec:
      containers:
        - name: dont-fire-deployment
          ports:
          - containerPort: 8080
            name: http
          livenessProbe:
            httpGet:
              path: "/"
              port: http
        - name: dont-fire-deployment
          ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          livenessProbe:
            httpGet:
              path: "/"
              port: 8080
        - name: dont-fire-deployment-port-in-args
          args:
            - --metrics-addr=0.0.0.0:8080
            - --health-probe-addr=:8081
          ports:
          - containerPort: 8080
            name: metrics
            protocol: TCP
          livenessProbe:
            httpGet:
              path: "/healthz"
              port: 8081
        - name: fire-deployment-name
          livenessProbe:
            httpGet:
              path: "/"
              port: http
        - name: fire-deployment-int
          ports:
          - containerPort: 9999
            name: http
            protocol: TCP
          livenessProbe:
            httpGet:
              path: "/"
              port: 8080
        - name: fire-deployment-udp
          ports:
          - containerPort: 9999
            name: udp
            protocol: UDP
          livenessProbe:
            tcpSocket:
              port: udp
---
apiVersion: apps/v1
kind: StatefulSet
spec:
  template:
    spec:
      containers:
        - name: dont-fire-stateful
          ports:
          - containerPort: 8080
            name: http
            protocol: TCP
        - name: fire-stateful-name
          ports:
          - containerPort: 9999
            name: http
            protocol: TCP
          livenessProbe:
            httpGet:
              path: "/"
              port: healthcheck
