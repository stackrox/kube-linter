---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dangerous-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dangerous-binding
subjects:
  - kind: ServiceAccount
    name: dangerous-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: default
spec:
  serviceAccountName: dangerous-sa
  containers:
  - name: app
    image: nginx:1.20
